<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FinTrack</title>
  
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link rel="shortcut icon" href="https://img.icons8.com/fluency/96/wallet.png" type="image/x-icon">
  <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/192/wallet.png">
  
  <link rel="manifest" href='data:application/manifest+json,{
    "name": "FinTrack Keuangan",
    "short_name": "FinTrack",
    "description": "Aplikasi Catat Keuangan Pribadi",
    "start_url": "./index.html",
    "display": "standalone",
    "background_color": "#0f172a",
    "theme_color": "#0f172a",
    "orientation": "portrait",
    "icons": [
      {"src": "https://img.icons8.com/fluency/96/wallet.png", "sizes": "96x96", "type": "image/png"},
      {"src": "https://img.icons8.com/fluency/192/wallet.png", "sizes": "192x192", "type": "image/png"},
      {"src": "https://img.icons8.com/fluency/512/wallet.png", "sizes": "512x512", "type": "image/png"}
    ]
  }'>

  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; }
    iframe { border: none; width: 100%; height: 100%; }
  </style>
</head>
<body>

  <iframe src="https://script.google.com/macros/s/AKfycbzkT7d4sIhq4eqcxy80PpVHwDCWOso4Oa0jNO_QJ3PXeQ-v06p4O16Ih6dvse8vLytY/exec"></iframe>

  <script>
    // Registrasi SW fisik resmi untuk syarat wajib PWA Google Chrome
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('PWA FinTrack Aktif Sekali!'))
          .catch(err => console.log('Gagal PWA:', err));
      });
    }
  </script>
</body>
</html>
